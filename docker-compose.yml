# TimeSync – Docker Compose configuration
#
# Profiles:
#   (default)  – HTTP, suitable for local dev behind a reverse proxy.
#   tls        – Bring-your-own cert: mount PEM files and set TLS_CERT_FILE / TLS_KEY_FILE.
#
# Usage:
#   docker compose up -d                     # start in background
#   docker compose up -d --build             # rebuild images then start
#   docker compose logs -f                   # tail all logs
#   docker compose down                      # stop and remove containers
#
# Environment overrides:
#   Copy .env.example to .env and edit to customise without touching this file.

services:
  # ── Go backend ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: time-sync-backend
    restart: unless-stopped

    environment:
      # Server
      PORT: "8080"
      TLS_ENABLED: "${TLS_ENABLED:-false}"
      TLS_CERT_FILE: "${TLS_CERT_FILE:-}"
      TLS_KEY_FILE: "${TLS_KEY_FILE:-}"

      # CORS – allow the nginx frontend container on port 80 and local dev on 5173.
      # Adjust ALLOWED_ORIGINS in .env for your production domain.
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost,http://localhost:80,http://localhost:5173}"

      # Optional Maconomy defaults (users can override per-session in the UI).
      MACONOMY_BASE_URL: "${MACONOMY_BASE_URL:-}"
      MACONOMY_COMPANY: "${MACONOMY_COMPANY:-}"

    # TLS cert/key volume mount (used when TLS_ENABLED=true).
    volumes:
      - "${TLS_CERT_DIR:-/dev/null}:/certs:ro"

    # The backend is only accessible via the frontend nginx proxy –
    # it does NOT expose a port directly to the host in production.
    # Uncomment the lines below for direct backend access during development.
    # ports:
    #   - "8080:8080"

    networks:
      - time-sync-internal

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── React frontend (nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: time-sync-frontend
    restart: unless-stopped

    ports:
      # Expose port 80 to the host (or your reverse proxy).
      # For HTTPS termination, put Caddy or Traefik in front and point it here.
      - "${FRONTEND_PORT:-80}:80"

    depends_on:
      backend:
        condition: service_healthy

    networks:
      - time-sync-internal

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  # Internal bridge network – containers communicate by service name.
  # The backend is never reachable from outside this network.
  time-sync-internal:
    driver: bridge
    internal: false # set to true if you add a dedicated ingress container
