<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="TimeSync – Report your hours once, sync to all your time-reporting systems."
        />

        <!--
      Content-Security-Policy is also set by the backend/nginx for the API.
      This meta tag provides defence-in-depth for the SPA itself.
      Adjust script-src if you add third-party scripts.
    -->
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss:; img-src 'self' data:; font-src 'self';"
        />

        <title>TimeSync</title>
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.jsx"></script>
    </body>
</html>
