# nginx.conf – TimeSync frontend server
#
# Responsibilities:
#  1. Serve the React SPA with HTML5 history-mode routing support.
#  2. Reverse-proxy all /api/* requests to the Go backend.
#  3. Set security headers (defence-in-depth; backend also sets them).
#  4. Handle Server-Sent Events correctly (disable buffering for /api/sync/status).
#  5. Enable gzip compression for static assets.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 6;

    # ── Security headers ──────────────────────────────────────────────────
    # These mirror what the Go backend sets for API responses.
    # Applying them here covers the static SPA assets too.
    add_header X-Content-Type-Options    "nosniff"                          always;
    add_header X-Frame-Options           "DENY"                             always;
    add_header X-XSS-Protection          "1; mode=block"                    always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Content-Security-Policy for the SPA.
    # connect-src allows same-origin for API calls + SSE.
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; font-src 'self'; frame-ancestors 'none';"
        always;

    # ── Static assets (long cache) ─────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Allow gzip_static to serve pre-compressed files if present.
        try_files $uri =404;
    }

    # ── Health endpoint (maps to backend health, or serve a local stub) ────
    location = /health {
        proxy_pass         http://backend:8080/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── API proxy ──────────────────────────────────────────────────────────
    # All /api/* requests are forwarded to the Go backend.
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;

        # Pass real client info.
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for SSE (Server-Sent Events): disable read timeout and
        # buffering so status updates stream in real time.
        proxy_read_timeout          86400s;
        proxy_buffering             off;
        proxy_cache                 off;

        # SSE-specific: keep the connection alive.
        proxy_set_header   Connection        "";
    }

    # ── SPA fallback ───────────────────────────────────────────────────────
    # All other requests serve index.html so React Router handles the URL.
    location / {
        try_files $uri $uri/ /index.html;

        # index.html must not be cached so the browser always fetches the
        # latest version after a deployment.
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Error pages ────────────────────────────────────────────────────────
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
